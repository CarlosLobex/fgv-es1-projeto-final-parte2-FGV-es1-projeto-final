<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" font-family="Arial, sans-serif" font-size="13">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#444"/>
    </marker>
    <marker id="arr-dash" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#888"/>
    </marker>
  </defs>
  <rect width="900" height="620" fill="#f8f9fa"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Diagrama de Sequência — Buscar Perguntas por Palavra-Chave</text>

  <!-- Lifelines header -->
  <!-- Usuario -->
  <ellipse cx="80" cy="80" rx="35" ry="20" fill="#4a90d9" stroke="#2c6fad" stroke-width="2"/>
  <text x="80" y="85" text-anchor="middle" fill="white" font-weight="bold" font-size="12">Usuário</text>
  <line x1="80" y1="100" x2="80" y2="580" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Frontend -->
  <rect x="220" y="60" width="110" height="36" rx="4" fill="#27ae60" stroke="#1e8449" stroke-width="2"/>
  <text x="275" y="83" text-anchor="middle" fill="white" font-weight="bold" font-size="12">Frontend</text>
  <line x1="275" y1="96" x2="275" y2="580" stroke="#27ae60" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- API -->
  <rect x="420" y="60" width="110" height="36" rx="4" fill="#e67e22" stroke="#ca6f1e" stroke-width="2"/>
  <text x="475" y="83" text-anchor="middle" fill="white" font-weight="bold" font-size="12">API (Express)</text>
  <line x1="475" y1="96" x2="475" y2="580" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Banco -->
  <rect x="640" y="60" width="120" height="36" rx="4" fill="#8e44ad" stroke="#7d3c98" stroke-width="2"/>
  <text x="700" y="83" text-anchor="middle" fill="white" font-weight="bold" font-size="12">Banco (SQLite)</text>
  <line x1="700" y1="96" x2="700" y2="580" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Mensagens -->
  <!-- 1 -->
  <line x1="80" y1="140" x2="265" y2="140" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="172" y="133" text-anchor="middle" font-size="11" fill="#1a1a2e">1. digita palavra-chave</text>

  <!-- 2 -->
  <line x1="275" y1="175" x2="465" y2="175" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="370" y="168" text-anchor="middle" font-size="11" fill="#1a1a2e">2. GET /perguntas?q=termo</text>

  <!-- 3 -->
  <line x1="475" y1="210" x2="690" y2="210" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="582" y="203" text-anchor="middle" font-size="11" fill="#1a1a2e">3. SELECT ... LIKE '%termo%'</text>

  <!-- alt box -->
  <rect x="120" y="230" width="660" height="280" rx="4" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <rect x="120" y="230" width="80" height="20" fill="#888" rx="2"/>
  <text x="160" y="244" text-anchor="middle" font-size="11" fill="white" font-weight="bold">alt</text>

  <!-- alt 1: resultados encontrados -->
  <text x="130" y="265" font-size="11" fill="#555" font-style="italic">[resultados encontrados]</text>
  <line x1="700" y1="280" x2="486" y2="280" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="592" y="273" text-anchor="middle" font-size="11" fill="#555">lista de perguntas</text>
  <line x1="475" y1="305" x2="286" y2="305" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="380" y="298" text-anchor="middle" font-size="11" fill="#555">200 OK — JSON</text>
  <line x1="275" y1="330" x2="91" y2="330" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="183" y="323" text-anchor="middle" font-size="11" fill="#555">lista filtrada</text>

  <!-- separator -->
  <line x1="120" y1="350" x2="780" y2="350" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="370" font-size="11" fill="#555" font-style="italic">[nenhum resultado]</text>

  <!-- alt 2: nenhum resultado -->
  <line x1="700" y1="385" x2="486" y2="385" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="592" y="378" text-anchor="middle" font-size="11" fill="#555">lista vazia []</text>
  <line x1="475" y1="410" x2="286" y2="410" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="380" y="403" text-anchor="middle" font-size="11" fill="#555">200 OK — []</text>
  <line x1="275" y1="435" x2="91" y2="435" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="183" y="428" text-anchor="middle" font-size="11" fill="#555">"Nenhuma pergunta encontrada"</text>

  <!-- separator -->
  <line x1="120" y1="455" x2="780" y2="455" stroke="#888" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="472" font-size="11" fill="#555" font-style="italic">[erro no servidor]</text>

  <!-- alt 3: erro -->
  <line x1="700" y1="485" x2="486" y2="485" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="592" y="478" text-anchor="middle" font-size="11" fill="#c0392b">erro de execução</text>
  <line x1="475" y1="505" x2="286" y2="505" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="380" y="498" text-anchor="middle" font-size="11" fill="#c0392b">500 Internal Server Error</text>
  <line x1="275" y1="525" x2="91" y2="525" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-dash)"/>
  <text x="183" y="518" text-anchor="middle" font-size="11" fill="#c0392b">"Erro ao realizar busca"</text>

  <!-- Numeração lateral -->
  <text x="20" y="144" font-size="10" fill="#aaa">①</text>
  <text x="20" y="179" font-size="10" fill="#aaa">②</text>
  <text x="20" y="214" font-size="10" fill="#aaa">③</text>
</svg>