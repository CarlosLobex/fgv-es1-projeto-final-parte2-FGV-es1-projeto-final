<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="700" font-family="Arial, sans-serif" font-size="13">
  <rect width="1100" height="700" fill="#f8f9fa"/>
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Diagrama de Classes — ESM Forum</text>

  <!-- Usuario -->
  <rect x="20" y="60" width="200" height="145" rx="6" fill="white" stroke="#4a90d9" stroke-width="2"/>
  <rect x="20" y="60" width="200" height="30" rx="6" fill="#4a90d9"/>
  <rect x="20" y="84" width="200" height="6" fill="#4a90d9"/>
  <text x="120" y="81" text-anchor="middle" fill="white" font-weight="bold">Usuario</text>
  <text x="30" y="115" fill="#333">+ id: int</text>
  <text x="30" y="133" fill="#333">+ nome: string</text>
  <text x="30" y="151" fill="#333">+ email: string</text>
  <text x="30" y="169" fill="#333">+ senha_hash: string</text>
  <text x="30" y="187" fill="#333">+ criado_em: datetime</text>

  <!-- Pergunta -->
  <rect x="400" y="60" width="220" height="165" rx="6" fill="white" stroke="#4a90d9" stroke-width="2"/>
  <rect x="400" y="60" width="220" height="30" rx="6" fill="#4a90d9"/>
  <rect x="400" y="84" width="220" height="6" fill="#4a90d9"/>
  <text x="510" y="81" text-anchor="middle" fill="white" font-weight="bold">Pergunta</text>
  <text x="410" y="115" fill="#333">+ id: int</text>
  <text x="410" y="133" fill="#333">+ titulo: string</text>
  <text x="410" y="151" fill="#333">+ corpo: string</text>
  <text x="410" y="169" fill="#333">+ autor_id: int</text>
  <text x="410" y="187" fill="#333">+ criado_em: datetime</text>
  <text x="410" y="205" fill="#333">+ votos_total: int</text>

  <!-- Resposta -->
  <rect x="400" y="310" width="220" height="145" rx="6" fill="white" stroke="#4a90d9" stroke-width="2"/>
  <rect x="400" y="310" width="220" height="30" rx="6" fill="#4a90d9"/>
  <rect x="400" y="334" width="220" height="6" fill="#4a90d9"/>
  <text x="510" y="331" text-anchor="middle" fill="white" font-weight="bold">Resposta</text>
  <text x="410" y="365" fill="#333">+ id: int</text>
  <text x="410" y="383" fill="#333">+ corpo: string</text>
  <text x="410" y="401" fill="#333">+ pergunta_id: int</text>
  <text x="410" y="419" fill="#333">+ autor_id: int</text>
  <text x="410" y="437" fill="#333">+ criado_em: datetime</text>

  <!-- Tag -->
  <rect x="750" y="60" width="180" height="115" rx="6" fill="white" stroke="#27ae60" stroke-width="2"/>
  <rect x="750" y="60" width="180" height="30" rx="6" fill="#27ae60"/>
  <rect x="750" y="84" width="180" height="6" fill="#27ae60"/>
  <text x="840" y="81" text-anchor="middle" fill="white" font-weight="bold">Tag</text>
  <text x="760" y="115" fill="#333">+ id: int</text>
  <text x="760" y="133" fill="#333">+ nome: string</text>
  <text x="760" y="151" fill="#333">+ slug: string</text>

  <!-- Voto -->
  <rect x="750" y="310" width="220" height="145" rx="6" fill="white" stroke="#e67e22" stroke-width="2"/>
  <rect x="750" y="310" width="220" height="30" rx="6" fill="#e67e22"/>
  <rect x="750" y="334" width="220" height="6" fill="#e67e22"/>
  <text x="860" y="331" text-anchor="middle" fill="white" font-weight="bold">Voto</text>
  <text x="760" y="365" fill="#333">+ id: int</text>
  <text x="760" y="383" fill="#333">+ usuario_id: int</text>
  <text x="760" y="401" fill="#333">+ pergunta_id: int</text>
  <text x="760" y="419" fill="#333">+ tipo: string (up/down)</text>
  <text x="760" y="437" fill="#333">+ criado_em: datetime</text>

  <!-- PerguntaTag -->
  <rect x="590" y="560" width="200" height="90" rx="6" fill="white" stroke="#8e44ad" stroke-width="2" stroke-dasharray="6,3"/>
  <rect x="590" y="560" width="200" height="30" rx="6" fill="#8e44ad"/>
  <text x="690" y="581" text-anchor="middle" fill="white" font-weight="bold">PerguntaTag</text>
  <text x="600" y="613" fill="#333">+ pergunta_id: int</text>
  <text x="600" y="631" fill="#333">+ tag_id: int</text>

  <!-- Relacionamentos -->
  <!-- Usuario -> Pergunta: cria (1 para 0..*) -->
  <line x1="220" y1="120" x2="400" y2="130" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="290" y="113" font-size="11" fill="#555">1</text>
  <text x="370" y="113" font-size="11" fill="#555">0..*</text>
  <text x="270" y="130" font-size="11" fill="#888" font-style="italic">cria</text>

  <!-- Usuario -> Resposta -->
  <line x1="120" y1="205" x2="120" y2="500" stroke="#555" stroke-width="1.5"/>
  <line x1="120" y1="500" x2="400" y2="390" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="125" y="360" font-size="11" fill="#888" font-style="italic">responde</text>

  <!-- Usuario -> Voto -->
  <line x1="220" y1="175" x2="750" y2="390" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-orange)"/>
  <text x="450" y="280" font-size="11" fill="#e67e22" font-style="italic">registra</text>

  <!-- Pergunta -> Resposta (1 para 0..*) -->
  <line x1="510" y1="225" x2="510" y2="310" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="516" y="257" font-size="11" fill="#555">1</text>
  <text x="516" y="305" font-size="11" fill="#555">0..*</text>
  <text x="525" y="275" font-size="11" fill="#888" font-style="italic">possui</text>

  <!-- Pergunta -> Voto (1 para 0..*) -->
  <line x1="620" y1="150" x2="750" y2="350" stroke="#e67e22" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <text x="668" y="240" font-size="11" fill="#e67e22" font-style="italic">recebe</text>

  <!-- Pergunta -> Tag via PerguntaTag -->
  <line x1="510" y1="225" x2="690" y2="560" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-purple)"/>
  <line x1="840" y1="175" x2="690" y2="560" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-purple)"/>
  <text x="640" y="480" font-size="11" fill="#8e44ad" font-style="italic">categoriza (0..3)</text>

  <!-- Marcadores -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
    <marker id="arrow-purple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8e44ad"/>
    </marker>
  </defs>

  <!-- Legenda -->
  <rect x="20" y="560" width="300" height="110" rx="6" fill="white" stroke="#ccc" stroke-width="1"/>
  <text x="30" y="580" font-size="12" font-weight="bold" fill="#333">Legenda</text>
  <line x1="30" y1="595" x2="70" y2="595" stroke="#555" stroke-width="1.5"/>
  <text x="80" y="599" font-size="11" fill="#555">Associação / Composição</text>
  <line x1="30" y1="615" x2="70" y2="615" stroke="#e67e22" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="80" y="619" font-size="11" fill="#555">Associação nova (votação)</text>
  <line x1="30" y1="635" x2="70" y2="635" stroke="#8e44ad" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="80" y="639" font-size="11" fill="#555">Associação nova (tags)</text>
  <rect x="30" y="648" width="40" height="14" fill="white" stroke="#27ae60" stroke-width="2"/>
  <text x="80" y="659" font-size="11" fill="#555">Classe nova (features)</text>
</svg>